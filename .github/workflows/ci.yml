name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check repository structure
        run: bash scripts/check-structure.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Lint README
        run: npx --yes awesome-lint@2.2.3 README.md

      - name: Check README links
        run: npx --yes markdown-link-check@3.14.2 README.md

      - name: Check cruising guide links
        run: |
          for file in docs/cruising-guides/*.md; do
            npx --yes markdown-link-check@3.14.2 "$file"
          done
